name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            preset: macos
          - os: windows-latest
            preset: windows
          - os: ubuntu-latest
            preset: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache build directories
        uses: actions/cache@v4
        with:
          path: |
            trussc/build-${{ matrix.preset }}
            projectGenerator/tools/projectGenerator/build
          key: ${{ runner.os }}-build-v2-${{ hashFiles('trussc/**/*.h', 'trussc/**/*.cpp', 'trussc/**/*.mm') }}
          restore-keys: |
            ${{ runner.os }}-build-v2-

      # Linux: Install dependencies using shared script
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          chmod +x projectGenerator/install_dependencies_linux.sh
          ./projectGenerator/install_dependencies_linux.sh -y

      # Windows: Setup MSVC environment (provides cl.exe, ninja, etc. in PATH)
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build ProjectGenerator
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            # Disable interactive commands
            sed -i '' 's/read -p/#read -p/g' projectGenerator/buildProjectGenerator_mac.command
            sed -i '' 's/open /#open /g' projectGenerator/buildProjectGenerator_mac.command
            ./projectGenerator/buildProjectGenerator_mac.command
          elif [ "$RUNNER_OS" == "Linux" ]; then
            chmod +x projectGenerator/buildProjectGenerator_linux.sh
            sed -i 's/read -p/#read -p/g' projectGenerator/buildProjectGenerator_linux.sh
            sed -i 's|\"$SCRIPT_DIR/projectGenerator\"|#&|g' projectGenerator/buildProjectGenerator_linux.sh
            ./projectGenerator/buildProjectGenerator_linux.sh
          elif [ "$RUNNER_OS" == "Windows" ]; then
            # Run batch file directly (Git Bash handles it)
            ./projectGenerator/buildProjectGenerator_win.bat
            echo "Searching for projectGenerator.exe..."
            find . -name projectGenerator.exe
          fi

      - name: Build examples
        shell: bash
        run: |
          chmod +x examples/build_all.py
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$COMMIT_MSG" == *"[full]"* ]]; then
             echo "Running full build (triggered by [full] in commit message)..."
             ./examples/build_all.py --verbose
          else
             echo "Running quick build (AllFeaturesExample only)..."
             ./examples/build_all.py --test-only --verbose
          fi

  build-web:
    timeout-minutes: 120
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache build directories
        uses: actions/cache@v4
        with:
          path: |
            trussc/build-web
            projectGenerator/tools/projectGenerator/build
          key: web-build-${{ hashFiles('trussc/**/*.h', 'trussc/**/*.cpp') }}
          restore-keys: |
            web-build-

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Install Linux dependencies (for ProjectGenerator)
        run: |
          chmod +x projectGenerator/install_dependencies_linux.sh
          ./projectGenerator/install_dependencies_linux.sh -y

      - name: Build ProjectGenerator
        run: |
          chmod +x projectGenerator/buildProjectGenerator_linux.sh
          sed -i 's/read -p/#read -p/g' projectGenerator/buildProjectGenerator_linux.sh
          sed -i 's|\"$SCRIPT_DIR/projectGenerator\"|#&|g' projectGenerator/buildProjectGenerator_linux.sh
          ./projectGenerator/buildProjectGenerator_linux.sh

      - name: Build examples (Web)
        run: |
          chmod +x examples/build_all.py
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$COMMIT_MSG" == *"[full]"* ]]; then
             echo "Running full build (triggered by [full] in commit message)..."
             ./examples/build_all.py --web-only --verbose
          else
             echo "Running quick build (AllFeaturesExample only)..."
             ./examples/build_all.py --web-only --test-only --verbose
          fi
